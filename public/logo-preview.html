<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProjectHub Logo Preview</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #F0F9FF;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 40px;
}
.card {
  background: white;
  border-radius: 24px;
  padding: 60px;
  box-shadow: 0 20px 60px rgba(15, 36, 64, 0.1);
  text-align: center;
  max-width: 600px;
}
.card h1 { margin-bottom: 8px; color: #1E3A5F; font-size: 14px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.5; }
.card p { color: #64748B; font-size: 14px; margin-bottom: 40px; }
.variants { display: flex; flex-direction: column; gap: 40px; }
.variant { padding: 30px; border-radius: 16px; background: #F8FAFC; border: 1px solid #E2E8F0; }
.variant-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #94A3B8; margin-bottom: 20px; }
.variant img { max-width: 100%; height: auto; }
.usage { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
.usage-item { padding: 20px; border-radius: 12px; background: white; border: 1px solid #E2E8F0; }
.usage-item h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #1E3A5F; margin-bottom: 12px; }
.usage-item p { font-size: 13px; color: #64748B; margin-bottom: 0; }
</style>
</head>
<body>
<div class="card">
  <h1>ProjectHub</h1>
  <p>Emblem Logo &mdash; Brand Identity</p>

  <div class="variants">
    <div class="variant">
      <div class="variant-label">Full Emblem</div>
      <img src="/logo.svg" alt="ProjectHub Logo" style="max-height: 300px;">
    </div>

    <div class="usage">
      <div class="usage-item">
        <h3>Favicon / App Icon</h3>
        <p>Use the shield mark alone for browser tabs, app icons, and small displays.</p>
      </div>
      <div class="usage-item">
        <h3>Header / Navigation</h3>
        <p>Use the emblem with "PROJECTHUB" text in nav bars and headers.</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
